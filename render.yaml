services:
  - type: web
    name: portfolio-website
    runtime: node
    rootDir: .
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # Set this in the Render dashboard (use a MongoDB Atlas URI)
